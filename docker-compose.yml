# =============================================================================
# Disclaude Docker Compose Configuration
# =============================================================================
#
# Architecture: Single-node application
# - Primary Node: Handles Feishu WebSocket connections + Agent execution + MCP
#
# Note: MCP functionality is built into Primary node, no separate deployment needed.
# For multi-instance scaling, deploy multiple independent application instances.
#
# Usage:
#   cp disclaude.config.example.yaml disclaude.config.yaml
#   # Edit disclaude.config.yaml with your API keys and settings
#   # (Optional) Configure source mirrors for faster downloads in China:
#   # cp docker-source.env.example docker-source.env
#   # Uncomment desired mirrors in docker-source.env, then:
#   # source docker-source.env && docker compose build
#   docker compose up -d
#
#   # View logs
#   docker compose logs -f
#
#   # Stop
#   docker compose down
#
# =============================================================================

services:
  # ===========================================================================
  # Primary Node (Comm + Exec)
  # ===========================================================================
  # Self-contained node that handles both communication and execution
  primary:
    build:
      context: .
      dockerfile: Dockerfile.primary
      args:
        APK_MIRROR: ${APK_MIRROR:-dl-cdn.alpinelinux.org}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-}
    image: disclaude:primary
    container_name: disclaude-primary
    restart: unless-stopped

    # Command: run Primary Node with PM2
    # PM2 provides process management and logging support
    command: ["pm2-runtime", "start", "ecosystem.primary.config.json"]

    # Network mode: host allows container to access host's CDP endpoint
    # and Playwright container's CDP endpoint (when using --profile playwright)
    network_mode: host

    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary

    volumes:
      - ./disclaude.config.yaml:/app/disclaude.config.yaml:ro
      - ./workspace:/app/workspace
      - ./logs:/app/logs

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Test Primary Node (optional)
  # ===========================================================================
  # Minimal primary node for testing - only mounts test config
  # Use --profile test to start: docker compose --profile test up -d
  # Note: Uses different ports (3011/3010) to avoid conflict with primary container
  test-primary:
    image: disclaude:primary
    container_name: disclaude-test-primary
    restart: unless-stopped

    command: ["pm2-runtime", "start", "ecosystem.primary.config.json"]

    network_mode: host

    environment:
      - NODE_ENV=test
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary
      - PORT=3011                    # WebSocket port (different from primary's 3001)
      - HOST=0.0.0.0

    volumes:
      - ./disclaude.config.test.yaml:/app/disclaude.config.yaml:ro

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    profiles:
      - test

  # ===========================================================================
  # Playwright Browser (optional)
  # ===========================================================================
  # Headless Chromium with CDP endpoint for browser automation (site-miner).
  # Disabled by default — enable with: docker compose --profile playwright up -d
  #
  # CDP endpoint: http://localhost:9222
  # The primary container (network_mode: host) can connect directly.
  # Configure in disclaude.config.yaml:
  #   mcpServers:
  #     playwright:
  #       args: ["@playwright/mcp@latest", "--cdp-endpoint", "http://localhost:9222"]
  #
  # Playwright Docker image: https://playwright.dev/docs/docker
  # Pin image version for reproducible builds (e.g., v1.52.1-noble).
  playwright:
    image: ${DOCKER_IMAGE_PREFIX:-}mcr.microsoft.com/playwright:v1.52.1-noble
    container_name: disclaude-playwright
    restart: unless-stopped
    network_mode: host

    # Start Chromium with CDP (Chrome DevTools Protocol) enabled
    # Args match scripts/start-playwright-cdp.sh for consistency
    entrypoint: ["bash", "-c"]
    command:
      - |
        CHROME=$$(find /ms-playwright -name chrome -type f -path '*/chrome-linux/*' | head -1)
        if [ -z "$$CHROME" ]; then
          echo "ERROR: Chrome binary not found in /ms-playwright" >&2
          exit 1
        fi
        echo "Starting Chrome CDP: $$CHROME on port 9222"
        exec "$$CHROME" \
          --headless=new \
          --no-sandbox \
          --disable-setuid-sandbox \
          --disable-dev-shm-usage \
          --disable-gpu \
          --disable-software-rasterizer \
          --disable-background-networking \
          --disable-default-apps \
          --disable-extensions \
          --disable-sync \
          --disable-translate \
          --hide-scrollbars \
          --metrics-recording-only \
          --mute-audio \
          --no-first-run \
          --safebrowsing-disable-auto-update \
          --remote-debugging-address=0.0.0.0 \
          --remote-debugging-port=9222 \
          about:blank

    environment:
      - DISPLAY=:99

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9222/json/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    profiles:
      - playwright
