# =============================================================================
# Disclaude Docker Compose Configuration
# =============================================================================
#
# Architecture: Single-node application
# - Primary Node: Handles Feishu WebSocket connections + Agent execution + MCP
#
# Note: MCP functionality is built into Primary node, no separate deployment needed.
# For multi-instance scaling, deploy multiple independent application instances.
#
# Usage:
#   cp disclaude.config.example.yaml disclaude.config.yaml
#   # Edit disclaude.config.yaml with your API keys and settings
#   # (Optional) Configure source mirrors for faster downloads in China:
#   # cp docker-source.env.example docker-source.env
#   # Uncomment desired mirrors in docker-source.env, then:
#   # source docker-source.env && docker compose build
#   docker compose up -d
#
#   # View logs
#   docker compose logs -f
#
#   # Stop
#   docker compose down
#
# =============================================================================

services:
  # ===========================================================================
  # Primary Node (Comm + Exec)
  # ===========================================================================
  # Self-contained node that handles both communication and execution
  primary:
    build:
      context: .
      dockerfile: Dockerfile.primary
      args:
        APK_MIRROR: ${APK_MIRROR:-dl-cdn.alpinelinux.org}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-}
    image: disclaude:primary
    container_name: disclaude-primary
    restart: unless-stopped

    # Command: run Primary Node with PM2
    # PM2 provides process management and logging support
    command: ["pm2-runtime", "start", "ecosystem.primary.config.json"]

    # Network mode: host allows container to access host's CDP endpoint
    # (e.g., Playwright container's mapped port via localhost:9222)
    network_mode: host

    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary

    volumes:
      - ./disclaude.config.yaml:/app/disclaude.config.yaml:ro
      - ./workspace:/app/workspace
      - ./logs:/app/logs

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Test Primary Node (optional)
  # ===========================================================================
  # Minimal primary node for testing - only mounts test config
  # Use --profile test to start: docker compose --profile test up -d
  # Note: Uses different ports (3011/3010) to avoid conflict with primary container
  test-primary:
    image: disclaude:primary
    container_name: disclaude-test-primary
    restart: unless-stopped

    command: ["pm2-runtime", "start", "ecosystem.primary.config.json"]

    network_mode: host

    environment:
      - NODE_ENV=test
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary
      - PORT=3011                    # WebSocket port (different from primary's 3001)
      - HOST=0.0.0.0

    volumes:
      - ./disclaude.config.test.yaml:/app/disclaude.config.yaml:ro

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    profiles:
      - test

  # ===========================================================================
  # Playwright Browser (optional)
  # ===========================================================================
  # Provides a headless Chromium browser with CDP endpoint for browser automation.
  # Use --profile playwright to start: docker compose --profile playwright up -d
  #
  # The primary container uses network_mode: host, so it connects to the CDP
  # endpoint via http://localhost:9222 (mapped from this container).
  # Configure the CDP URL in disclaude.config.yaml:
  #   mcpServers:
  #     playwright:
  #       args: ["@playwright/mcp@latest", "--cdp-endpoint", "http://localhost:9222"]
  playwright:
    image: ${PLAYWRIGHT_IMAGE:-mcr.microsoft.com/playwright:v1.60.0-noble}
    container_name: disclaude-playwright
    restart: unless-stopped

    # Run Chromium with CDP enabled on port 9222
    entrypoint: ["sh", "-c"]
    command:
      - |
        CHROME_BIN=$$(find /ms-playwright -name chrome -type f -path '*/chrome-linux/*' | head -1)
        if [ -z "$$CHROME_BIN" ]; then
          echo "ERROR: Chrome binary not found in /ms-playwright/"
          exit 1
        fi
        echo "Starting Chromium CDP server on port $${PLAYWRIGHT_CDP_PORT:-9222}..."
        exec "$$CHROME_BIN" \
          --headless=new \
          --no-sandbox \
          --disable-dev-shm-usage \
          --remote-debugging-port=$${PLAYWRIGHT_CDP_PORT:-9222} \
          --remote-debugging-address=0.0.0.0 \
          --disable-gpu \
          --mute-audio \
          about:blank

    environment:
      - PLAYWRIGHT_CDP_PORT=${PLAYWRIGHT_CDP_PORT:-9222}

    ports:
      - "${PLAYWRIGHT_CDP_PORT:-9222}:${PLAYWRIGHT_CDP_PORT:-9222}"

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PLAYWRIGHT_CDP_PORT:-9222}/json/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    profiles:
      - playwright
