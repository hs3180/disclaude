# =============================================================================
# Disclaude Docker Compose Configuration
# =============================================================================
#
# Architecture: Single-node application
# - Primary Node: Handles Feishu WebSocket connections + Agent execution + MCP
#
# Note: MCP functionality is built into Primary node, no separate deployment needed.
# For multi-instance scaling, deploy multiple independent application instances.
#
# Usage:
#   cp disclaude.config.example.yaml disclaude.config.yaml
#   # Edit disclaude.config.yaml with your API keys and settings
#   # (Optional) Configure source mirrors for faster downloads:
#   # Uncomment desired mirrors in .env, then:
#   # docker compose up -d --build
#   docker compose up -d
#
#   # View logs
#   docker compose logs -f
#
#   # Stop
#   docker compose down
#
# =============================================================================

services:
  # ===========================================================================
  # Primary Node (Comm + Exec)
  # ===========================================================================
  # Self-contained node that handles both communication and execution
  primary:
    build:
      context: .
      dockerfile: Dockerfile.primary
      args:
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-}
    image: disclaude:primary
    container_name: disclaude-primary
    restart: unless-stopped

    # Command: run Primary Node directly
    # Docker restart policy handles process management
    command: ["node", "packages/primary-node/dist/cli.js", "start"]

    # Uses bridge network (disclaude-net) for container-to-container communication
    # (e.g., CDP endpoint from playwright service). Re-add `network_mode: host`
    # if primary needs to access other host-local services.
    networks:
      - disclaude-net

    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary
      - HOST=0.0.0.0
      - DISCLAUDE_WORKSPACE_DIR=/data/workspace
      # Docker restart policy handles singleton enforcement; disable PID lockfile
      # to prevent stale lockfile from blocking startup after container restart.
      - LOCKFILE_PATH=
      # Enable file logging (set LOG_TO_FILE=true in .env when using Filebeat)
      - LOG_TO_FILE=${LOG_TO_FILE:-false}
      - LOG_DIR=/data/logs

    volumes:
      - ./disclaude.config.yaml:/app/disclaude.config.yaml:ro
      - ${WORKSPACE_DIR:-./workspace}:/data/workspace
      - log_data:/data/logs

    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 512M

    # Logging: json-file with rotation (default).
    # To forward to Elasticsearch/Loki, change driver to "fluentd" or "syslog".
    # See docs/log-forwarding.md for Fluentd/Filebeat setup examples.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Playwright Browser (optional)
  # ===========================================================================
  # Headless Chromium with CDP for browser automation.
  # Start with: docker compose --profile playwright up -d
  #
  # The CDP endpoint is available at http://disclaude-playwright:9222
  # within the Docker network (internal only, not exposed to host).
  # Configure in disclaude.config.yaml:
  #   tools:
  #     mcpServers:
  #       playwright:
  #         command: npx
  #         args: ["@playwright/mcp@latest", "--cdp-endpoint", "http://disclaude-playwright:9222"]
  playwright:
    image: mcr.microsoft.com/playwright:${PLAYWRIGHT_IMAGE_TAG:-v1.60.0-noble}
    container_name: disclaude-playwright
    restart: unless-stopped

    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /ms-playwright/chromium-*/chrome-linux64/chrome \
          --headless=new \
          --no-sandbox \
          --disable-setuid-sandbox \
          --disable-dev-shm-usage \
          --disable-gpu \
          --disable-software-rasterizer \
          --disable-background-networking \
          --disable-default-apps \
          --disable-extensions \
          --disable-sync \
          --disable-translate \
          --hide-scrollbars \
          --metrics-recording-only \
          --mute-audio \
          --no-first-run \
          --safebrowsing-disable-auto-update \
          --disable-features=site-per-process \
          --remote-debugging-port=$${CDP_PORT:-9222} \
          --remote-debugging-address=0.0.0.0 \
          --user-data-dir=/tmp/chrome-cdp \
          about:blank

    networks:
      - disclaude-net

    environment:
      - CDP_PORT=${CDP_PORT:-9222}

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # CMD-SHELL so the container shell expands ${CDP_PORT} at runtime (matching
    # the --remote-debugging-port flag above). The exec-form "CMD" does not run a
    # shell, so $${CDP_PORT:-9222} would be passed to curl literally and never expand.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:$${CDP_PORT:-9222}/json/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    profiles:
      - playwright

  # ===========================================================================
  # Filebeat Log Forwarder (optional)
  # ===========================================================================
  # Forwards Pino JSON logs from primary container to Elasticsearch.
  # Reads from shared Docker volume (log_data), connects to ES via host network.
  # Configure ES connection in .env (ES_HOST, ES_PORT, ES_USERNAME, ES_PASSWORD).
  # Start with: docker compose --profile logging up -d
  filebeat:
    image: elastic/filebeat:${FILEBEAT_VERSION:-8.18.0}
    container_name: disclaude-filebeat
    restart: unless-stopped

    network_mode: host

    depends_on:
      primary:
        condition: service_started

    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - log_data:/data/logs:ro
      - filebeat_data:/usr/share/filebeat/data

    environment:
      - ELASTICSEARCH_HOST=${ES_HOST:-localhost}
      - ELASTICSEARCH_PORT=${ES_PORT:-9200}
      # ES auth credentials (from .env: ES_USERNAME, ES_PASSWORD).
      # Enabled by default for secured ES. Remove these lines if your ES has
      # no auth — passing empty values causes HTTP 401 on unsecured instances.
      - ELASTICSEARCH_USERNAME=${ES_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ES_PASSWORD}

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5066/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    profiles:
      - logging

volumes:
  log_data:
  filebeat_data:

networks:
  disclaude-net:
    driver: bridge
