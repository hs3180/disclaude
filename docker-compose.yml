# =============================================================================
# Disclaude Docker Compose Configuration
# =============================================================================
#
# Architecture: Single-node application
# - Primary Node: Handles Feishu WebSocket connections + Agent execution + MCP
#
# Note: MCP functionality is built into Primary node, no separate deployment needed.
# For multi-instance scaling, deploy multiple independent application instances.
#
# Usage:
#   cp disclaude.config.example.yaml disclaude.config.yaml
#   # Edit disclaude.config.yaml with your API keys and settings
#   # (Optional) Configure source mirrors for faster downloads in China:
#   # cp docker-source.env.example docker-source.env
#   # Uncomment desired mirrors in docker-source.env, then:
#   # source docker-source.env && docker compose build
#   docker compose up -d
#
#   # View logs
#   docker compose logs -f
#
#   # Stop
#   docker compose down
#
# =============================================================================

services:
  # ===========================================================================
  # Primary Node (Comm + Exec)
  # ===========================================================================
  # Self-contained node that handles both communication and execution
  primary:
    build:
      context: .
      dockerfile: Dockerfile.primary
      args:
        APK_MIRROR: ${APK_MIRROR:-dl-cdn.alpinelinux.org}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-}
    image: disclaude:primary
    container_name: disclaude-primary
    restart: unless-stopped

    # Command: run Primary Node with PM2
    # PM2 provides process management and logging support
    command: ["pm2-runtime", "start", "ecosystem.primary.config.json"]

    # Network mode: host allows container to access host's CDP endpoint
    network_mode: host

    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary

    volumes:
      - ./disclaude.config.yaml:/app/disclaude.config.yaml:ro
      - ./workspace:/app/workspace
      - ./logs:/app/logs

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Test Primary Node (optional)
  # ===========================================================================
  # Minimal primary node for testing - only mounts test config
  # Use --profile test to start: docker compose --profile test up -d
  # Note: Uses different ports (3011/3010) to avoid conflict with primary container
  test-primary:
    image: disclaude:primary
    container_name: disclaude-test-primary
    restart: unless-stopped

    command: ["pm2-runtime", "start", "ecosystem.primary.config.json"]

    network_mode: host

    environment:
      - NODE_ENV=test
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary
      - PORT=3011                    # WebSocket port (different from primary's 3001)
      - HOST=0.0.0.0

    volumes:
      - ./disclaude.config.test.yaml:/app/disclaude.config.yaml:ro

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    profiles:
      - test

  # ===========================================================================
  # Playwright Browser (optional)
  # ===========================================================================
  # Headless Chromium with CDP endpoint for browser automation (site-miner, etc.)
  # Disabled by default — enable with: docker compose --profile playwright up -d
  #
  # Prerequisites:
  #   - Primary container uses network_mode: host (default), so it can reach
  #     the CDP endpoint at http://localhost:{CDP_PORT}
  #   - Update disclaude.config.yaml mcpServers.playwright to match CDP_PORT
  #
  # Usage:
  #   docker compose --profile playwright up -d
  #
  playwright:
    image: mcr.microsoft.com/playwright:v1.52.1-noble
    container_name: disclaude-playwright
    restart: unless-stopped

    # Start headless Chromium with remote debugging (CDP)
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        CHROMIUM=$$(find /ms-playwright -name "chrome" -type f -executable 2>/dev/null | head -1)
        if [ -z "$$CHROMIUM" ]; then
          echo "Error: Chromium not found in /ms-playwright" >&2
          exit 1
        fi
        echo "Starting Chromium CDP server: $$CHROMIUM"
        echo "CDP endpoint: http://0.0.0.0:$${CDP_PORT:-9222}"
        exec "$$CHROMIUM" \
          --headless=new \
          --no-sandbox \
          --disable-dev-shm-usage \
          --remote-debugging-port=$${CDP_PORT:-9222} \
          --remote-debugging-address=0.0.0.0 \
          --disable-gpu \
          --mute-audio \
          --no-first-run \
          --hide-scrollbars \
          --disable-features=site-per-process \
          about:blank

    environment:
      - CDP_PORT=${CDP_PORT:-9222}

    # network_mode: host allows primary container to reach CDP via localhost
    network_mode: host

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${CDP_PORT:-9222}/json/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    profiles:
      - playwright
