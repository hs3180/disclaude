# =============================================================================
# Disclaude Docker Compose Configuration
# =============================================================================
#
# Architecture: Single-node application
# - Primary Node: Handles Feishu WebSocket connections + Agent execution + MCP
#
# Note: MCP functionality is built into Primary node, no separate deployment needed.
# For multi-instance scaling, deploy multiple independent application instances.
#
# Usage:
#   cp disclaude.config.example.yaml disclaude.config.yaml
#   # Edit disclaude.config.yaml with your API keys and settings
#   # (Optional) Configure source mirrors for faster downloads:
#   # Uncomment desired mirrors in .env, then:
#   # docker compose up -d --build
#   docker compose up -d
#
#   # View logs
#   docker compose logs -f
#
#   # Stop
#   docker compose down
#
# =============================================================================

services:
  # ===========================================================================
  # Primary Node (Comm + Exec)
  # ===========================================================================
  # Self-contained node that handles both communication and execution
  primary:
    build:
      context: .
      dockerfile: Dockerfile.primary
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-}
        GH_INSTALL_MODE: ${GH_INSTALL_MODE:-apt-repo}
        GH_DEB_URL: ${GH_DEB_URL:-}
    image: disclaude:primary
    container_name: disclaude-primary
    restart: unless-stopped

    # Command: run Primary Node directly
    # Docker restart policy handles process management
    command: ["node", "packages/primary-node/dist/cli.js", "start"]

    # Uses bridge network (disclaude-net) for container-to-container communication
    # (e.g., CDP endpoint from playwright service). Re-add `network_mode: host`
    # if primary needs to access other host-local services.
    networks:
      - disclaude-net

    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary
      - HOST=0.0.0.0
      - DISCLAUDE_WORKSPACE_DIR=/data/workspace
      # Issue #4181: re-enable Claude Code's built-in (session-only) cron/loop
      # tools (CronCreate/CronList/CronDelete/ScheduleWakeup), disallowed for
      # chat agents by default. Set DISCLAUDE_ALLOW_BUILTIN_CRON=1 in .env to
      # use the built-in /loop dynamic mode; leave unset to keep the persistent
      # `schedule` skill as the only scheduling mechanism.
      - DISCLAUDE_ALLOW_BUILTIN_CRON=${DISCLAUDE_ALLOW_BUILTIN_CRON:-}
      # Docker restart policy handles singleton enforcement; disable PID lockfile
      # to prevent stale lockfile from blocking startup after container restart.
      - LOCKFILE_PATH=
      # Enable file logging (set LOG_TO_FILE=true in .env when using Filebeat)
      - LOG_TO_FILE=${LOG_TO_FILE:-false}
      - LOG_DIR=/data/logs
      # Issue #4114: Cap compile parallelism for agent-spawned builds.
      # Override to increase/decrease based on available memory.
      - MAKEFLAGS=${MAKEFLAGS:--j2}
      - CMAKE_BUILD_PARALLEL_LEVEL=${CMAKE_BUILD_PARALLEL_LEVEL:-2}

    # Issue #4114: OOM protection — set host-side via the `oom_score_adj` field.
    # cgroup v2 forbids writing a negative /proc/self/oom_score_adj from inside the
    # container (the entrypoint approach in #4114 silently failed with EPERM), so
    # this MUST be applied here by the Docker daemon instead. Range: -1000 (never
    # kill) to +1000 (always kill). Default: -500.
    oom_score_adj: ${OOM_SCORE_ADJ:--500}

    volumes:
      - ./disclaude.config.yaml:/app/disclaude.config.yaml:ro
      # Workspace host path. Defaults to ./workspace; set WORKSPACE_DIR in .env to
      # relocate it (e.g. to a larger/SSD volume). The container runs as uid 1001
      # (disclaude), so the host directory must be owned by 1001:1001 — otherwise
      # message handling fails with EACCES when it tries to write chat logs here.
      # NOTE: if WORKSPACE_DIR points at a path that doesn't yet exist, docker
      # creates it as root:root — mkdir + chown 1001:1001 it yourself first.
      - ${WORKSPACE_DIR:-./workspace}:/data/workspace
      - log_data:/data/logs

    # Issue #4285 (part 1): opt-in GPU runtime via env (approach b — Alpine base
    # unchanged, GPU exposed through `runtime: nvidia`; torch/conda bundle their
    # own CUDA runtime, so no Dockerfile change is needed). All defaults below
    # preserve CPU-only behavior exactly:
    #   DOCKER_RUNTIME unset → "default" (the no-op default runtime);
    #   SHM_SIZE unset       → 64m (the container's default /dev/shm);
    #   WORKER_MEMORY unset  → 16G (the current limit).
    # To enable GPU on a host with nvidia-container-toolkit installed, e.g.:
    #   DOCKER_RUNTIME=nvidia SHM_SIZE=4G WORKER_MEMORY=40G \
    #     NVIDIA_VISIBLE_DEVICES=all docker compose up -d
    # See docs/gpu-setup.md for prerequisites and the #4285 open questions
    # deferred from this PR (Dockerfile base-image decision, primary-vs-worker
    # scope, shm_size default sizing).
    runtime: ${DOCKER_RUNTIME:-default}
    shm_size: ${SHM_SIZE:-64m}
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEMORY:-16G}
        reservations:
          memory: 512M

    # Logging: json-file with rotation (default).
    # To forward to Elasticsearch/Loki, change driver to "fluentd" or "syslog".
    # See docs/log-forwarding.md for Fluentd/Filebeat setup examples.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "packages/primary-node/dist/cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Playwright Browser (optional)
  # ===========================================================================
  # Headless Chromium with CDP for browser automation.
  # Start with: docker compose --profile playwright up -d
  #
  # The CDP endpoint is available at http://disclaude-playwright:${CDP_PORT:-9222}
  # within the Docker network (internal only, not exposed to host).
  #
  # IMPORTANT — why an nginx reverse proxy fronts Chrome's CDP listener:
  # Two quirks of the official Playwright image's Chromium (Chrome 148+, `--headless=new`)
  # prevent other containers from reaching CDP over the bridge network:
  #   1. `--remote-debugging-address=0.0.0.0` is IGNORED — CDP binds to 127.0.0.1 only.
  #   2. Its HTTP/WS endpoints enforce a DNS-rebinding check and reject any request whose
  #      `Host` header is neither an IP nor `localhost` (HTTP 500: "Host header is
  #      specified and is not an IP address or localhost"). A plain TCP forwarder (socat)
  #      passes the container hostname through as Host and is rejected.
  # An nginx reverse proxy solves both: it listens on 0.0.0.0:$CDP_PORT, forwards to
  # Chrome's loopback listener ($CDP_INTERNAL_PORT), rewrites `Host` to this container's
  # bridge-network IP (so Chrome embeds a reachable IP into the webSocketDebuggerUrl),
  # and upgrades HTTP->WebSocket for the CDP socket. The two ports MUST differ (otherwise
  # nginx cannot bind 0.0.0.0:$CDP_PORT — it would collide with Chrome's 127.0.0.1
  # listener on the same port). See docker/playwright-cdp-nginx.conf for the full rationale.
  #
  # Configure in disclaude.config.yaml:
  #   tools:
  #     mcpServers:
  #       playwright:
  #         command: npx
  #         args: ["-y", "@playwright/mcp@latest",
  #                "--cdp-endpoint", "http://disclaude-playwright:9222"]
  playwright:
    image: mcr.microsoft.com/playwright:${PLAYWRIGHT_IMAGE_TAG:-v1.60.0-noble}
    container_name: disclaude-playwright
    restart: unless-stopped

    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        CDP_PORT=$${CDP_PORT:-9222}
        CDP_INTERNAL_PORT=$${CDP_INTERNAL_PORT:-9221}
        if [ "$$CDP_PORT" = "$$CDP_INTERNAL_PORT" ]; then
          echo "FATAL: CDP_PORT ($$CDP_PORT) must differ from CDP_INTERNAL_PORT" >&2
          exit 1
        fi
        # nginx is not bundled in the Playwright image; install on first boot.
        command -v nginx >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq --no-install-recommends nginx)
        # Resolve this container's IPv4 on the Docker bridge network. Chrome embeds the
        # Host header into the webSocketDebuggerUrl it returns, so the IP must be one
        # other containers can reach (NOT 127.0.0.1, NOT an IPv6 — the latter would
        # produce a ws URL like ws://[::1]:... that the MCP client cannot route to).
        # `hostname -i` may list loopback/IPv6 first; grep for the first dotted-quad.
        CDP_HOST=$$(hostname -i | tr ' ' '\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$$' | grep -v '^127\.' | head -n1)
        if [ -z "$$CDP_HOST" ]; then
          echo "FATAL: could not determine a bridge-network IPv4 for CDP_HOST" >&2
          exit 1
        fi
        # Resolve the Docker bridge gateway IP. A request arriving from the host
        # (via the published loopback port) is SNAT'd through this gateway, so nginx
        # sees it as $remote_addr == gateway. The nginx map uses this to detect
        # host-originated requests and embed 127.0.0.1 into their webSocketDebuggerUrl
        # (instead of CDP_HOST), so the host MCP connects back over loopback. See
        # docker/playwright-cdp-nginx.conf header comment.
        GATEWAY=$$(ip route 2>/dev/null | awk '/^default/{print $3; exit}')
        if [ -z "$$GATEWAY" ]; then
          GATEWAY=$$(route -n 2>/dev/null | awk '$$1=="0.0.0.0"{print $$2; exit}')
        fi
        if [ -z "$$GATEWAY" ]; then
          echo "FATAL: could not determine the bridge gateway IP" >&2
          exit 1
        fi
        # Substitute the placeholders in the mounted nginx config (see
        # docker/playwright-cdp-nginx.conf), then start nginx. nginx cannot read env
        # vars for `map`/`listen`/`proxy_pass`/headers at runtime, so we template
        # them here.
        sed "s/__CDP_HOST__/$$CDP_HOST/g; s/__GATEWAY__/$$GATEWAY/g; s/__CDP_PORT__/$$CDP_PORT/g; s/__CDP_INTERNAL_PORT__/$$CDP_INTERNAL_PORT/g" \
            /etc/nginx/cdp-proxy.conf.template > /tmp/cdp-nginx.conf
        nginx -c /tmp/cdp-nginx.conf
        exec /ms-playwright/chromium-*/chrome-linux64/chrome \
          --headless=new \
          --no-sandbox \
          --disable-setuid-sandbox \
          --disable-dev-shm-usage \
          --disable-gpu \
          --disable-software-rasterizer \
          --disable-background-networking \
          --disable-default-apps \
          --disable-extensions \
          --disable-sync \
          --disable-translate \
          --hide-scrollbars \
          --metrics-recording-only \
          --mute-audio \
          --no-first-run \
          --safebrowsing-disable-auto-update \
          --disable-features=site-per-process \
          --remote-debugging-port=$$CDP_INTERNAL_PORT \
          --user-data-dir=/tmp/chrome-cdp \
          about:blank

    networks:
      - disclaude-net

    # Publish the nginx-fronted CDP endpoint to the host so MCP clients running
    # on the host (user-scope ~/.claude.json) can reach it at localhost:${CDP_PORT}.
    # This is more stable than pinning the container's bridge IP (which can change
    # when the network is recreated). nginx already listens on 0.0.0.0:${CDP_PORT},
    # so we publish that same port on both sides — the container-side port MUST equal
    # ${CDP_PORT}, which is where nginx listens (NOT a fixed 9222; a fixed value would
    # break the host-scope MCP whenever CDP_PORT is overridden).
    #
    # Bind to the loopback interface only (127.0.0.1), NOT 0.0.0.0. Chrome's CDP
    # exposes the live browser session (pages, JS context, network) unauthenticated,
    # so binding to all interfaces would let any host on the LAN drive the browser.
    # The MCP client runs on this same host, so loopback is sufficient.
    ports:
      - "127.0.0.1:${CDP_PORT:-9222}:${CDP_PORT:-9222}"

    volumes:
      # nginx reverse-proxy config (templated with port placeholders). See the
      # header comment above and docker/playwright-cdp-nginx.conf for why it's needed.
      - ./docker/playwright-cdp-nginx.conf:/etc/nginx/cdp-proxy.conf.template:ro

    environment:
      # External port other containers connect to (nginx listens here).
      - CDP_PORT=${CDP_PORT:-9222}
      # Chrome's internal loopback-only CDP port. Must differ from CDP_PORT.
      - CDP_INTERNAL_PORT=${CDP_INTERNAL_PORT:-9221}

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Probe the endpoint through nginx (not Chrome directly), so the healthcheck
    # catches Chrome dying AND the nginx proxy failing. The previous localhost-only
    # probe hit Chrome's loopback listener directly and stayed green even when CDP was
    # unreachable from other containers. CMD-SHELL so the shell expands $CDP_PORT at
    # runtime (the exec-form "CMD" does not run a shell, so $${CDP_PORT:-9222} would
    # be passed to curl literally and never expand).
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:$${CDP_PORT:-9222}/json/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    profiles:
      - playwright

  # ===========================================================================
  # Filebeat Log Forwarder (optional)
  # ===========================================================================
  # Forwards Pino JSON logs from primary container to Elasticsearch.
  # Reads from shared Docker volume (log_data), connects to ES via host network.
  # Configure ES connection in .env (ES_HOST, ES_PORT, ES_USERNAME, ES_PASSWORD).
  # Start with: docker compose --profile logging up -d
  filebeat:
    image: elastic/filebeat:${FILEBEAT_VERSION:-8.18.0}
    container_name: disclaude-filebeat
    restart: unless-stopped

    network_mode: host

    depends_on:
      primary:
        condition: service_started

    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - log_data:/data/logs:ro
      - filebeat_data:/usr/share/filebeat/data

    environment:
      - ELASTICSEARCH_HOST=${ES_HOST:-localhost}
      - ELASTICSEARCH_PORT=${ES_PORT:-9200}
      # ES auth credentials (from .env: ES_USERNAME, ES_PASSWORD).
      # Enabled by default. Set credentials in .env for secured ES.
      # For unsecured ES, comment out these two lines (and the matching
      # username/password in filebeat.yml) to avoid HTTP 401 from empty values.
      - ELASTICSEARCH_USERNAME=${ES_USERNAME:-}
      - ELASTICSEARCH_PASSWORD=${ES_PASSWORD:-}

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5066/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    profiles:
      - logging

volumes:
  log_data:
  filebeat_data:

networks:
  disclaude-net:
    driver: bridge
