# =============================================================================
# Disclaude Docker Compose Configuration
# =============================================================================
#
# Architecture: Single-node application
# - Primary Node: Handles Feishu WebSocket connections + Agent execution + MCP
#
# Note: MCP functionality is built into Primary node, no separate deployment needed.
# For multi-instance scaling, deploy multiple independent application instances.
#
# Usage:
#   cp disclaude.config.example.yaml disclaude.config.yaml
#   # Edit disclaude.config.yaml with your API keys and settings
#   # (Optional) Configure source mirrors for faster downloads in China:
#   # cp docker-source.env.example docker-source.env
#   # Uncomment desired mirrors in docker-source.env, then:
#   # source docker-source.env && docker compose build
#   docker compose up -d
#
#   # View logs
#   docker compose logs -f
#
#   # Stop
#   docker compose down
#
# =============================================================================

services:
  # ===========================================================================
  # Primary Node (Comm + Exec)
  # ===========================================================================
  # Self-contained node that handles both communication and execution
  primary:
    build:
      context: .
      dockerfile: Dockerfile.primary
      args:
        APK_MIRROR: ${APK_MIRROR:-dl-cdn.alpinelinux.org}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-}
    image: disclaude:primary
    container_name: disclaude-primary
    restart: unless-stopped

    # Command: run Primary Node with PM2
    # PM2 provides process management and logging support
    command: ["pm2-runtime", "start", "ecosystem.primary.config.json"]

    # Network mode: host allows container to access host's CDP endpoint
    network_mode: host

    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary

    volumes:
      - ./disclaude.config.yaml:/app/disclaude.config.yaml:ro
      - ./workspace:/app/workspace
      - ./logs:/app/logs

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Test Primary Node (optional)
  # ===========================================================================
  # Minimal primary node for testing - only mounts test config
  # Use --profile test to start: docker compose --profile test up -d
  # Note: Uses different ports (3011/3010) to avoid conflict with primary container
  test-primary:
    image: disclaude:primary
    container_name: disclaude-test-primary
    restart: unless-stopped

    command: ["pm2-runtime", "start", "ecosystem.primary.config.json"]

    network_mode: host

    environment:
      - NODE_ENV=test
      - TZ=Asia/Shanghai
      - DISCLAUDE_MODE=primary
      - PORT=3011                    # WebSocket port (different from primary's 3001)
      - HOST=0.0.0.0

    volumes:
      - ./disclaude.config.test.yaml:/app/disclaude.config.yaml:ro

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node.*cli.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    profiles:
      - test

  # ===========================================================================
  # Playwright Browser (optional)
  # ===========================================================================
  # Headless Chromium with CDP endpoint for browser automation.
  # Use --profile playwright to start: docker compose --profile playwright up -d
  #
  # The primary container uses network_mode: host, so it connects to this
  # container via PLAYWRIGHT_CDP_URL (default: ws://localhost:3000).
  #
  # Requirements:
  #   - Set PLAYWRIGHT_CDP_URL in docker-source.env or disclaude.config.yaml
  #   - The Playwright MCP server in the primary container must be configured
  #     to connect to this CDP endpoint instead of launching its own browser.
  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: disclaude-playwright
    restart: unless-stopped

    # Start headless Chromium with CDP (Chrome DevTools Protocol) endpoint.
    # The Playwright image has browsers installed at /ms-playwright/.
    # We find Chromium dynamically and start it with --remote-debugging-port.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        CHROMIUM=$$(find /ms-playwright -name "chrome" -type f -path "*/chrome-linux/*" | head -1)
        if [ -z "$$CHROMIUM" ]; then
          echo "ERROR: Chromium not found in /ms-playwright/" >&2
          exit 1
        fi
        echo "Starting Chromium: $$CHROMIUM"
        exec "$$CHROMIUM" \
          --headless=new \
          --no-sandbox \
          --disable-setuid-sandbox \
          --disable-dev-shm-usage \
          --disable-gpu \
          --remote-debugging-port=3000 \
          --remote-debugging-address=0.0.0.0 \
          about:blank

    ports:
      - "${PLAYWRIGHT_CDP_PORT:-3000}:3000"

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    profiles:
      - playwright
