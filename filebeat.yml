# =============================================================================
# Filebeat Configuration for Disclaude
# =============================================================================
# Forwards Pino structured JSON logs to Elasticsearch.
#
# Connection details are injected via environment variables in docker-compose.yml.
# Auth credentials come from .env (ES_HOST, ES_PORT, ES_USERNAME, ES_PASSWORD).
#
# Usage:
#   docker compose --profile logging up -d
#
# Verify:
#   docker compose logs filebeat --tail=20
#   curl -u elastic:<password> http://<es-host>:9200/_cat/indices?v&index=disclaude-logs*
# =============================================================================

filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /data/logs/disclaude-combined.log
    # Pino outputs structured JSON — parse it natively
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: msg
    # Pino uses "time" (ISO 8601) as the timestamp field
    fields_under_root: true
    fields:
      # Tag for Kibana filtering
      source: disclaude
    # Close inactive file handles to prevent resource leaks
    close_inactive: 5m
    # Remove registry state for deleted/rotated files
    clean_removed: true
    # Clean up file state for files older than 72h (after rotation)
    # ignore_older is required when clean_inactive is set, and must be less than it
    ignore_older: 71h
    clean_inactive: 72h

processors:
  # Use Pino's "time" field as @timestamp
  - timestamp:
      field: time
      layouts:
        - '2006-01-02T15:04:05.999Z07:00'
        - '2006-01-02T15:04:05.999999Z07:00'
      ignore_missing: true
  # Drop the original time field (now duplicated as @timestamp)
  - drop_fields:
      fields: ["time", "log", "ecs", "agent", "input", "stream"]
      ignore_missing: true

output.elasticsearch:
  hosts: ["${ELASTICSEARCH_HOST}:${ELASTICSEARCH_PORT}"]
  # ES auth credentials (from ELASTICSEARCH_USERNAME/PASSWORD env vars,
  # wired through docker-compose.yml from .env). For unsecured ES, comment
  # out username/password here AND the matching lines in docker-compose.yml.
  username: "${ELASTICSEARCH_USERNAME}"
  password: "${ELASTICSEARCH_PASSWORD}"
  index: "disclaude-logs-%{+yyyy.MM.dd}"

# Disable ILM and data streams — use simple daily indices
setup.ilm.enabled: false
# Disable Filebeat's auto-managed index template.
# Filebeat 8.x generates a template containing a top-level `data_stream: {}`,
# which marks it as a data-stream template. The daily index name
# `disclaude-logs-YYYY.MM.dd` matches ES's data-stream naming convention
# (type-dataset-namespace), so ES would auto-create data streams instead of
# plain indices. With template management disabled, no data-stream template is
# installed, and ES creates plain indices with dynamic mappings.
#
# For single-node ES deployments, create a plain index template to control
# shard/replica settings (the default 1 replica causes yellow status on a
# single node). For example:
#   PUT _index_template/disclaude-logs
#   {
#     "index_patterns": ["disclaude-logs-*"],
#     "template": {
#       "settings": {
#         "number_of_shards": 1,
#         "number_of_replicas": 0
#       }
#     }
#   }
setup.template.enabled: false

# HTTP monitoring endpoint — serves / and /stats with live metrics.
# Required by the docker-compose healthcheck (curl http://localhost:5066/).
# Binds to localhost only — not exposed externally.
# NOTE: filebeat uses network_mode: host in docker-compose, so "localhost" here
# maps directly to the host's 127.0.0.1 loopback interface.
http:
  enabled: true
  host: localhost
  port: 5066

# Filebeat's own logging
logging.level: info
logging.to_stderr: true
