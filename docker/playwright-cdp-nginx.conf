# =============================================================================
# nginx reverse-proxy fronting Chrome's CDP (DevTools) listener.
# =============================================================================
# Used by the `playwright` service in docker-compose.yml.
#
# Why this exists — Chrome 148+ (--headless=new) in the official Playwright image
# has two quirks that block cross-container access over the Docker bridge network:
#   1. `--remote-debugging-address=0.0.0.0` is IGNORED: CDP binds to 127.0.0.1 only.
#   2. Its HTTP/WebSocket endpoints enforce a DNS-rebinding check and reject any
#      request whose Host header is neither an IP nor `localhost`
#      (HTTP 500: "Host header is specified and is not an IP address or localhost").
#
# This nginx config solves both by listening on the external port (CDP_PORT, bound
# to 0.0.0.0) and reverse-proxying to Chrome's loopback listener (CDP_INTERNAL_PORT),
# upgrading HTTP->WebSocket for the CDP socket.
#
# The Host header is rewritten to "<ip>:<CDP_PORT>". This is the one form that
# satisfies BOTH constraints:
#   - It is an IP, so Chrome's DNS-rebinding check accepts it.
#   - Chrome embeds it into the `webSocketDebuggerUrl` it returns, and the MCP
#     client (Playwright's connectOverCDP) connects back to that ws URL. So the IP
#     must be one the *client* can reach.
#
# Source-aware Host rewriting (the map below):
# The IP to embed depends on WHERE the client runs, because the ws URL Chrome
# returns is what the client must connect back to:
#   - A peer container on the Docker bridge network (e.g. the primary node) must
#     get a ws URL it can route to. When such a request arrives, nginx sees the
#     peer's bridge IP in $remote_addr — which is NOT the gateway, so we embed
#     THIS container's bridge IP (__CDP_HOST__). That ws://<container-ip>:... is
#     reachable from any peer on the bridge.
#   - A client on the host (the user-scope ~/.claude.json MCP, reaching CDP via
#     the published loopback port) arrives with $remote_addr == the Docker
#     gateway IP (__GATEWAY__), because the host is SNAT'd through the gateway.
#     For it we embed 127.0.0.1, so the returned ws://127.0.0.1:... resolves back
#     to the host's own loopback (where the published port is bound), instead of
#     the container's bridge IP. This keeps the host path purely on loopback and
#     decouples it from the container's bridge IP (which can change if the Docker
#     network is recreated).
#
# Net effect: containers connect via the bridge IP, the host connects via
# localhost — each on its most stable local path.
#
# The placeholders __CDP_HOST__ / __GATEWAY__ / __CDP_PORT__ / __CDP_INTERNAL_PORT__
# are substituted at container start by the entrypoint (sed), because nginx cannot
# read env vars for `map`/`listen`/`proxy_pass`/headers at runtime without templating.
# =============================================================================

worker_processes 1;
pid /tmp/cdp-nginx.pid;
error_log /dev/null;

events {
    worker_connections 1024;
}

http {
    access_log /dev/null;

    # Pick the Host value to embed based on the request source. A request from the
    # Docker gateway (__GATEWAY__) is the host reaching in via the published port;
    # everything else is a peer container on the bridge. See the header comment.
    map $remote_addr $cdp_host {
        default        __CDP_HOST__;
        __GATEWAY__    127.0.0.1;
    }

    server {
        listen __CDP_PORT__;

        location / {
            proxy_pass http://127.0.0.1:__CDP_INTERNAL_PORT__;
            proxy_http_version 1.1;

            # Rewrite Host -> <chosen-ip>:<CDP_PORT>. See the header comment for why
            # the IP (not a hostname) matters: it must pass Chrome's Host check AND
            # be reachable by the originating client's WebSocket connection.
            proxy_set_header Host $cdp_host:__CDP_PORT__;

            # Upgrade HTTP -> WebSocket for the CDP socket (/devtools/browser/...).
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # CDP sessions are long-lived; keep the proxy open.
            proxy_read_timeout 86400;
        }
    }
}
