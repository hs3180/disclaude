# =============================================================================
# nginx reverse-proxy fronting Chrome's CDP (DevTools) listener.
# =============================================================================
# Used by the `playwright` service in docker-compose.yml.
#
# Why this exists — Chrome 148+ (--headless=new) in the official Playwright image
# has two quirks that block cross-container access over the Docker bridge network:
#   1. `--remote-debugging-address=0.0.0.0` is IGNORED: CDP binds to 127.0.0.1 only.
#   2. Its HTTP/WebSocket endpoints enforce a DNS-rebinding check and reject any
#      request whose Host header is neither an IP nor `localhost`
#      (HTTP 500: "Host header is specified and is not an IP address or localhost").
#
# This nginx config solves both by listening on the external port (CDP_PORT, bound
# to 0.0.0.0) and reverse-proxying to Chrome's loopback listener (CDP_INTERNAL_PORT),
# upgrading HTTP->WebSocket for the CDP socket.
#
# The Host header is rewritten to "<container-ip>:<CDP_PORT>". This is the one value
# that satisfies BOTH constraints:
#   - It is an IP, so Chrome's DNS-rebinding check accepts it.
#   - Chrome embeds it into the `webSocketDebuggerUrl` it returns (e.g.
#     ws://<container-ip>:<CDP_PORT>/devtools/...). The MCP client (Playwright's
#     connectOverCDP) then connects to that ws URL — which is reachable from other
#     containers on the bridge network — instead of `localhost` (which would point
#     back at the client's own loopback).
#
# The placeholders __CDP_HOST__ / __CDP_PORT__ / __CDP_INTERNAL_PORT__ are substituted
# at container start by the entrypoint (sed), because nginx cannot read env vars for
# `listen`/`proxy_pass`/headers at runtime without extra templating.
# =============================================================================

worker_processes 1;
pid /tmp/cdp-nginx.pid;
error_log /dev/null;

events {
    worker_connections 1024;
}

http {
    access_log /dev/null;

    server {
        listen __CDP_PORT__;

        location / {
            proxy_pass http://127.0.0.1:__CDP_INTERNAL_PORT__;
            proxy_http_version 1.1;

            # Rewrite Host -> <container-ip>:<CDP_PORT>. See the header comment for
            # why the IP (not a hostname) matters: it must pass Chrome's Host check AND
            # be reachable by the MCP client's WebSocket connection.
            proxy_set_header Host __CDP_HOST__:__CDP_PORT__;

            # Upgrade HTTP -> WebSocket for the CDP socket (/devtools/browser/...).
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # CDP sessions are long-lived; keep the proxy open.
            proxy_read_timeout 86400;
        }
    }
}

